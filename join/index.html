<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dicey — Join Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f7f4;
      font-family: 'Crimson Text', 'Georgia', serif;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border: 1.5px solid #d5d0c8;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
    }

    h1 {
      font-family: 'IM Fell English', 'Georgia', serif;
      font-style: italic;
      font-size: 2rem;
      font-weight: normal;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 1rem;
      color: #666;
      margin-bottom: 28px;
    }

    .room-label {
      font-size: 0.85rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .room-name {
      font-family: 'IM Fell English', 'Georgia', serif;
      font-size: 1.6rem;
      padding: 12px 20px;
      background: #f8f7f4;
      border: 1.5px solid #d5d0c8;
      border-radius: 8px;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .status {
      padding: 16px 20px;
      border-radius: 8px;
      font-size: 0.98rem;
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .status strong {
      display: block;
      font-size: 1.15rem;
      margin-bottom: 2px;
    }

    .status-waiting {
      background: #fef9e7;
      border: 1px solid #f0e0a0;
      color: #7a6c2a;
    }

    .status-joined {
      background: #eaf7ea;
      border: 1px solid #a0d8a0;
      color: #2a6a2a;
    }

    .status-noext {
      background: #fdf2f2;
      border: 1px solid #e0b0b0;
      color: #8a3a3a;
    }

    .next-step {
      margin-bottom: 6px;
      font-size: 1rem;
      color: #2e2e2e;
    }

    .helper-text {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .install-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 260px;
      padding: 11px 20px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.15s;
    }

    .install-btn:hover {
      background: #333;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 260px;
      padding: 10px 20px;
      background: #fff;
      color: #3b3b3b;
      border: 1px solid #c8c2b8;
      border-radius: 6px;
      font-family: 'Crimson Text', 'Georgia', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .copy-btn:hover {
      border-color: #9f9688;
      color: #1a1a1a;
      background: #faf9f7;
    }

    .no-room {
      font-style: italic;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <polygon points="64,6 116,34 116,94 64,122 12,94 12,34" fill="#c9a050" stroke="#1a1a1a" stroke-width="10" stroke-linejoin="round"/>
    </svg>

    <h1>dicey</h1>
    <p class="subtitle">P2P dice roller &amp; progress clocks</p>

    <div id="content">
      <div class="no-room">No room specified in URL.</div>
    </div>
  </div>

  <script>
    const INSTALL_URL = 'https://TODO-ADD-CHROME-WEB-STORE-LINK';
    const roomId = decodeURIComponent(window.location.hash.slice(1)).trim();
    const content = document.getElementById('content');

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function attachCopyHandler() {
      const copyBtn = document.getElementById('copy-btn');
      if (!copyBtn) return;

      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(roomId).then(() => {
          copyBtn.textContent = 'Copied!';
          setTimeout(() => {
            if (copyBtn.isConnected) copyBtn.textContent = 'Copy Room ID';
          }, 2000);
        }).catch(() => {
          copyBtn.textContent = 'Copy failed';
          setTimeout(() => {
            if (copyBtn.isConnected) copyBtn.textContent = 'Copy Room ID';
          }, 2000);
        });
      });
    }

    if (roomId) {
      const safeRoomId = escapeHtml(roomId);
      content.innerHTML = `
        <div class="room-label">Room</div>
        <div class="room-name">${safeRoomId}</div>
        <div class="status status-waiting" id="status">
          <strong>Joining room in the background...</strong>
          If Dicey is installed, you should be connected automatically in a moment.
        </div>
        <p class="next-step" id="next-step"></p>
        <p class="helper-text" id="helper-text"></p>
        <div class="actions" id="actions">
          <button class="copy-btn" id="copy-btn" title="Copy room ID to clipboard">Copy Room ID</button>
        </div>
      `;

      const status = document.getElementById('status');
      const nextStep = document.getElementById('next-step');
      const helperText = document.getElementById('helper-text');
      const actions = document.getElementById('actions');

      attachCopyHandler();

      function setJoinedState() {
        status.className = 'status status-joined';
        status.innerHTML = `<strong>You&apos;re in!</strong>Successfully joined <strong>${safeRoomId}</strong>.`;
        nextStep.innerHTML = 'You can safely close this tab. Open <strong>Dicey</strong> in your browser toolbar to start rolling.';
        helperText.textContent = 'Need to leave later? Open Dicey and disconnect from the network status menu.';
        actions.innerHTML = '<button class="copy-btn" id="copy-btn" title="Copy room ID to clipboard">Copy Room ID</button>';
        attachCopyHandler();
      }

      function setNoExtensionState() {
        status.className = 'status status-noext';
        status.innerHTML = '<strong>Dicey is not responding.</strong>Install Dicey to join this room.';
        nextStep.textContent = 'After installing, reopen this invite link and you should join automatically.';
        helperText.textContent = 'You can also copy the Room ID and paste it manually inside the extension.';
        actions.innerHTML = `
          <a class="install-btn" href="${INSTALL_URL}" target="_blank" rel="noopener noreferrer">
            Install Dicey to Join
          </a>
          <button class="copy-btn" id="copy-btn" title="Copy room ID to clipboard">Copy Room ID</button>
        `;
        attachCopyHandler();
      }

      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'DICEY_JOIN_CONFIRMED') {
          setJoinedState();
        }
      });

      setTimeout(() => {
        if (status && status.classList.contains('status-waiting')) {
          setNoExtensionState();
        }
      }, 5000);
    }
  </script>
</body>
</html>
